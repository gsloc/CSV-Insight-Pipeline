services:
  backend:
    build:
      context: ./server
    ports:
      - "8100:8100"
    environment:
      ALLOWED_ORIGINS: http://localhost:3100
    networks:
      - appnet

  frontend:
    build:
      context: ./client
      args:
        NEXT_PUBLIC_API_BASE: http://localhost:8100
    ports:
      - "3100:3100"
    depends_on:
      - backend
    networks:
      - appnet

networks:
  appnet:
    driver: bridge
