name: Tests

on:
  push:
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: server/requirements.txt

      - name: Install dependencies
        working-directory: ./server
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: ./server
        run: python -m pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: ./client
        # --legacy-peer-deps mirrors the local install: vite@7 (pulled by @vitejs/plugin-react)
        # declares a strict @types/node peer that our pinned 20.14 falls below. The conflict
        # is on a types-only peerOptional and is benign at runtime.
        run: npm ci --legacy-peer-deps

      - name: Run tests
        working-directory: ./client
        run: npm test
